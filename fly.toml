app = "text-to-sql-api"  # change to your desired app name

[build]
dockerfile = "backend/Dockerfile"

[env]
MISTRAL_API_KEY = ""  # leave empty, we'll set it via CLI

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = true
auto_start_machines = true
min_machines_running = 1
processes = ["app"]

[[vm]]
memory = "512mb"
cpu_kind = "shared"
cpus = 1